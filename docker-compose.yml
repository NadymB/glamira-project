version: "3.9"

services:
  producer:
    build: .
    command: >
      python3 etl/extract_data.py
      --producer_id 1 
      --start_id 5e83d98084f6c5377e331ace 
      --end_id 5ed8cb2cfeae1f377811165c
    env_file:
      - .env

  worker:
    build: .
    command: python3 src/ingestion/worker.py
    env_file:
      - .env
    restart: always

  consumer:
    build: .
    command: python3 etl/load_data.py
    environment:
    - GOOGLE_APPLICATION_CREDENTIALS=/app/key.json
    volumes:
      - /home/dantrinh2792001/key.json:/app/key.json
    env_file:
      - .env
    restart: always